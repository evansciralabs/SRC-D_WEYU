<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EVANSCIRA LABS // SUBSTRΛTΞ</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050607;--edge:#1c2226;--txt:#cfd8dc;--dim:#5c686e;
  --riot:#43ffa4;--cult:#ff4d3d;--sub:#8ab8ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Chakra Petch',monospace;display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none}
#plate{display:flex;align-items:center;gap:10px;padding:7px 12px;
  border-bottom:1px solid var(--edge);background:#07090b;flex-shrink:0}
#plate .corp{font-size:9px;letter-spacing:.3em;color:var(--dim);
  flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#plate .corp b{color:var(--txt);font-weight:600}
#plate .modDot{font-size:9px;letter-spacing:.14em;flex-shrink:0;padding:3px 6px;
  border:1px solid var(--edge);border-radius:3px;transition:color .25s}
#plate .modDot.riot{color:var(--riot)} #plate .modDot.cult{color:var(--cult)}
#plate .modDot.atmo{color:#b48aff}
#plate .modDot.bass{color:#ffd08a}
.runes{display:flex;gap:4px;margin-left:8px;flex-shrink:0}
/* Visual state framework for the offline render pipeline */
.led.ready i { opacity: 1 !important; box-shadow: 0 0 14px 3px var(--c) !important; }
.led.rendering i { animation: render-pulse 0.8s infinite alternate ease-in-out; }
@keyframes render-pulse { 0% { opacity: 0.2; } 100% { opacity: 1; box-shadow: 0 0 12px var(--c); } }
/* EVANSCIRA AR sigils: SVG reticles — corner brackets drawn in, so no
text-flow can ever stack them */
.rune{background:transparent;border:none;padding:0;cursor:pointer;
  width:38px;height:32px;flex-shrink:0;color:var(--sub)}
.rune svg{width:100%;height:100%;overflow:visible}
.rune .crn{fill:none;stroke:var(--dim);stroke-width:1.4;opacity:.7}
.rune .gly{fill:none;stroke:currentColor;stroke-width:1.7;stroke-linejoin:round;
  filter:drop-shadow(0 0 4px currentColor)}
.rune:active .gly{fill:currentColor;fill-opacity:.25}
#capBtn .g-save{display:none}
#capBtn.rec{color:var(--cult)}

#capBtn.rec .g-rec{display:none}
#capBtn.rec .g-save{display:block;animation:pulse 1.1s infinite}
@keyframes pulse{50%{opacity:.35;filter:drop-shadow(0 0 1px currentColor)}}
#xClose{font-family:inherit;font-size:12px;background:transparent;color:var(--dim);
  border:1px solid var(--edge);padding:5px 11px;cursor:pointer;letter-spacing:.1em;
  border-radius:3px;margin-left:8px;flex-shrink:0;white-space:nowrap}
#xClose:active{color:var(--txt)}
/* ═ the SUBSTRΛTΞ mixer: discreet LEDs, faders on demand ═ */
#mixer{display:flex;gap:6px;align-items:center;padding:5px 10px;
  border-bottom:1px solid var(--edge);background:#060809;flex-shrink:0}
#dots{display:flex;gap:4px;flex:1;min-width:0}
.led{font-family:inherit;font-size:8px;letter-spacing:.1em;color:var(--dim);
  background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:2px 5px;min-width:34px}
.led i{width:8px;height:8px;border-radius:50%;background:var(--c);
  box-shadow:0 0 6px var(--c);opacity:.85;transition:transform .15s}
.led.open{color:var(--txt)}
.led.open i{transform:scale(1.5);box-shadow:0 0 12px var(--c)}
.led.streaming i{box-shadow:0 0 16px 4px var(--c)!important;animation:stream-glow 2s infinite ease-in-out}
@keyframes stream-glow{0%,100%{opacity:.6}50%{opacity:1}}
#meter{font-size:11px;letter-spacing:.06em;color:var(--dim);min-width:66px;
  text-align:right;font-variant-numeric:tabular-nums}
#meter.g{color:var(--riot)} #meter.a{color:#ffb03d} #meter.r{color:var(--cult)}
#expand{display:none;padding:8px 12px 10px;border-bottom:1px solid var(--edge);
  background:#04070a}
#expand.open{display:block}
#expand .xlbl{display:flex;justify-content:space-between;font-size:9px;
  letter-spacing:.14em;color:var(--dim);margin-bottom:4px}
#expand .xlbl .v{color:var(--txt);font-size:11px}
#expand .rail{height:34px;background:#0c1013;border:1px solid var(--edge);
  position:relative;border-radius:4px;overflow:hidden;touch-action:none;cursor:ew-resize}
#expand .fill{position:absolute;left:0;top:0;bottom:0;background:var(--sub);opacity:.55}
#expand .gr{position:absolute;right:0;top:0;bottom:0;background:#ffb03d;opacity:.7;width:0}
#expand select{font-family:inherit;font-size:10px;background:#0c1013;color:var(--sub);
  border:1px solid var(--edge);padding:5px;border-radius:3px;margin-bottom:6px;width:100%}
#thumbBub{position:fixed;display:none;background:#0c1013;border:1px solid var(--sub);
  color:var(--txt);font-size:12px;padding:3px 8px;border-radius:3px;pointer-events:none;
  z-index:50;transform:translate(-50%,-140%);letter-spacing:.04em}
#capCfg{display:none;background:#0a0d10;border-bottom:1px solid var(--edge);
  padding:8px 12px;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
#capCfg.show{display:flex}
#capCfg .cl{font-size:8px;letter-spacing:.14em;color:var(--dim)}
#capCfg input,#capCfg select{font-family:inherit;font-size:11px;background:#0c1013;
  color:var(--txt);border:1px solid var(--edge);padding:5px;border-radius:3px;width:auto}
#capCfg input{width:52px}
#capCfg button{font-family:inherit;font-size:10px;letter-spacing:.08em;background:transparent;
  color:var(--sub);border:1px solid var(--sub);padding:6px 10px;border-radius:3px;cursor:pointer}
#capCfg #cGo{color:var(--riot);border-color:var(--riot)}
#saveChip{display:none;background:#140a0b;border-bottom:1px solid var(--cult);
  color:var(--txt);font-size:12px;letter-spacing:.06em;padding:10px 14px;
  text-decoration:none;text-align:center;flex-shrink:0;
  box-shadow:inset 0 0 20px rgba(255,77,61,.15)}
#saveChip.show{display:block}
/* in normal flow between mixer and faces: nothing can cover it */
#faces{position:relative;flex:1;overflow:hidden}
.face{position:absolute;inset:0;border:0;width:100%;height:100%;
  transition:transform .28s cubic-bezier(.6,0,.3,1),visibility .28s}
.face.off-l{transform:translateX(-102%);visibility:hidden;pointer-events:none}
.face.off-r{transform:translateX(102%);visibility:hidden;pointer-events:none}
.face.on{transform:translateX(0);visibility:visible}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--dim);letter-spacing:.14em;pointer-events:none;
  opacity:1;transition:opacity 1s;text-align:center;width:92%}
</style>
</head>
<body>
<div id="plate">
  <div class="corp"><b>EVANSCIRA</b> LABS // SUBSTRΛTΞ</div>
  <div class="modDot atmo" id="modName" title="active face">M01</div>
  <div class="runes">
    <button id="runAll" class="rune" title="start every powered face">
      <svg viewBox="0 0 36 30">
        <path class="crn" d="M2 9V2h7M27 2h7v7M34 21v7h-7M9 28H2v-7"/>
        <path class="gly" d="M14 9.5L25 15l-11 5.5z"/>
      </svg></button>
    <button id="stopAll" class="rune" title="stop every powered face">
      <svg viewBox="0 0 36 30">
        <path class="crn" d="M2 9V2h7M27 2h7v7M34 21v7h-7M9 28H2v-7"/>

      </svg></button>

      <svg viewBox="0 0 36 30">
        <path class="crn" d="M2 9V2h7M27 2h7v7M34 21v7h-7M9 28H2v-7"/>

        <g class="gly g-save">
          <path d="M18 7v9M13.5 12.5L18 17l4.5-4.5"/>
          <path d="M11 21.5h14"/>
        </g>
      </svg></button>
  </div>
  <button id="xClose">✕ CONSOLE</button>
</div>

<div id="mixer">
  <div id="dots">
    <button class="led" id="dAtmo"  data-key="lvlC"   style="--c:#b48aff"><i></i>ATMO</button>
    <button class="led" id="dRiot"  data-key="lvlA"   style="--c:var(--riot)"><i></i>RIOT</button>
    <button class="led" id="dCult"  data-key="lvlB"   style="--c:var(--cult)"><i></i>CULT</button>
    <button class="led" id="dBass"  data-key="lvlD"   style="--c:#ffd08a"><i></i>MRRW</button>
    <button class="led" id="dSC"    data-key="duckLaw"style="--c:var(--sub)"><i></i>SC</button>
    <button class="led" id="dGlue"  data-key="glue"   style="--c:#ffb03d"><i></i>GLUE</button>
    <button class="led" id="dMas"   data-key="master" style="--c:#e8eef3"><i></i>MST</button>
  </div>
  <div id="meter" title="session bus level, pre-limiter — aim around −6 dB">−∞ dB</div>
</div>
<div id="expand"></div>
<div id="capCfg">
  <span class="cl">BPM</span><input id="cBpm" type="number" min="40" max="220" value="120" inputmode="numeric">
  <span class="cl">BARS</span><select id="cBars"><option>1</option><option selected>2</option><option>4</option><option>8</option></select>
  <span class="cl">TAIL</span><select id="cTail"><option value="cut">cut · seamless</option>
    <option value="1">1s ring-out</option><option value="2" selected>2s ring-out</option><option value="4">4s ring-out</option></select>
  <button id="cGo">⏱ LOOP GRAB</button>
  <button id="cFree">⏺ FREE REC</button>
</div>
<a id="saveChip"></a>
<div id="thumbBub"></div>

<div id="faces">
  <iframe class="face on" id="fAtmo" src="vapor_throne.html" allow="autoplay"></iframe>
  <iframe class="face off-r" id="fRiot" data-src="overtone_riot.html" allow="autoplay"></iframe>
  <iframe class="face off-r" id="fCult" data-src="battery_cult.html" allow="autoplay"></iframe>
  <iframe class="face off-r" id="fBass" data-src="marrow.html" allow="autoplay"></iframe>
  <div id="hint">⫷ ⫸ IN A MODULE TITLE SWITCHES THE FACE · BOTH ENGINES STAY LIVE ·
    THE STRIP ABOVE IS THE SESSION MIXER — LEVELS, MODULE⤓MODULE SIDECHAIN, GLUE, MASTER</div>
</div>

<script>
"use strict";
/* ═════════ EVANSCIRA LABS // SUBSTRΛTΞ ═════════
   Unified low-end session console. Hosts MODULE 01 (OVERTONE_RIOT — sub /
   808 / pluck synthesis) and MODULE 02 (BΛTTΞRY CULT — sampler percussion)
   as live faces over one session mixer: per-module level, module⤓module
   sidechain, master GLUE compression, master fader. Levels + duck + glue
   only — no plugin processing lives here; the modules are the instruments.
   Dashboard contract: ✕ posts {src:'srcd-duo', cmd:'close'} when embedded.
   Rebrand point: the one string below.                                   */
const BRAND = "EVANSCIRA LABS // SUBSTRΛTΞ";

const MIXER_WORKLET = `
class SubstrateMix extends AudioWorkletProcessor {
  static get parameterDescriptors(){ return [
    {name:'lvlA', defaultValue:0.9, minValue:0, maxValue:1},
    {name:'lvlB', defaultValue:0.9, minValue:0, maxValue:1},
    {name:'lvlC', defaultValue:0.8, minValue:0, maxValue:1},
    {name:'lvlD', defaultValue:0.85, minValue:0, maxValue:1},
    {name:'duckA', defaultValue:0.45, minValue:0, maxValue:1},  /* ⤓RIOT  */
    {name:'duckC', defaultValue:0.70, minValue:0, maxValue:1},  /* ⤓ATMOS */
    {name:'duckD', defaultValue:0.55, minValue:0, maxValue:1},  /* ⤓MRRW  */
    {name:'yieldC', defaultValue:0.8, minValue:0, maxValue:1},  /* abyss yield */
    {name:'glue', defaultValue:0, minValue:0, maxValue:1},
    {name:'glueHp', defaultValue:0.6, minValue:0, maxValue:1},  /* detector HPF
      · 0→20Hz (defeat) … 1→400Hz · hz = 20 * 20^v, twinned in the UI */
    {name:'yieldB', defaultValue:0.5, minValue:0, maxValue:1},  /* BΞDROCK YIELD */
    {name:'master', defaultValue:0.9, minValue:0, maxValue:1},
  ];}
  constructor(){ super();
    this.rec=false; this.recL=[]; this.recR=[]; this.recTotal=0;
    this.stgL=new Float32Array(8192); this.stgR=new Float32Array(8192); this.stgN=0;
    /* GEMINI'S CATCH (verified): this.recL.push(new Float32Array(L)) every
       128-sample block was a fresh allocation ~375 times/sec on the render
       thread for the WHOLE duration of a live record — real GC pressure on
       a phone. STAGING FIX: accumulate into one reused 8192-sample buffer,
       copy out only when it's full. 64x fewer allocations, and they land on
       a ~170ms boundary instead of every single render callback.
       lpBufL/R are for LOOP capture specifically: that length is known
       EXACTLY at arm time, so it's pre-allocated once — zero allocation
       anywhere in its capture window at all, staging or otherwise. */
    this.lpBufL=null; this.lpBufR=null; this.lpWrite=0;
    this.port.onmessage = e => {
      if(e.data[0]==='rec'){
        if(e.data[1]){ this.recL=[]; this.recR=[]; this.rec=true;
          this.stgN=0; this.recTotal=0;   /* a fresh take must never inherit
            a stale partial chunk or the previous take's ceiling count */
          this.port.postMessage(['recack',1,0]);
        } else if(this.rec){
          this.rec=false;
          this.flushRecStaging();      /* the tail: whatever hadn't filled a
            full 8192-sample chunk yet would otherwise be silently dropped */
          this.port.postMessage(['recack',0,this.recL.length]);
          this.sendParts();            /* each chunk is ALREADY a safe part
            size — this used to re-group 128-sample buffers into parts AFTER
            the fact; the staging buffer means that regrouping is now done
            up front, for free, as the recording happens. */
        } else {
          this.port.postMessage(['recack',-1,0]);  /* stop with nothing armed */
        }
      }
      if(e.data[0]==='recloop'){
        /* scheduled capture: skip pre samples (one warm loop — FX build
           exactly like RIOT's offline pre-roll), record main+tail samples
           SAMPLE-EXACTLY (partial blocks sliced), announce the main/tail
           edge so the chassis can stop the transport for ring-out tails */
        this.lp={pre:e.data[1], main:e.data[2], tail:e.data[3], cnt:0};
        this.rec=false;
        /* the keep-length is KNOWN exactly, right now — pre-allocate once.
           Zero allocation anywhere in the capture window that follows. */
        const keep=e.data[2]+e.data[3];
        this.lpBufL=new Float32Array(keep); this.lpBufR=new Float32Array(keep);
        this.lpWrite=0;
        this.port.postMessage(['loopack', e.data[1], e.data[2], e.data[3]]);
      }
      if(e.data[0]==='recloopcancel'){ this.lp=null; this.lpBufL=null; this.lpBufR=null; this.lpWrite=0; }
      if(e.data[0]==='extc'){ this.extC=e.data[1]?1:0; }
    };
    this.envA=0; this.envB=0; this.envD=0; this.cEnv=0; this.gr=1; this.pk=0;
    this.hL1=0; this.hL2=0; this.hR1=0; this.hR2=0;   /* glue detector HPF */
    /* ═ SUB-OCCUPANCY DETECTOR ═
       BΞDROCK stands through a KICK and always should: measured correlation
       between the floor and a four-on-the-floor kick is 0.04 — a transient and
       a drone barely touch each other. But a sustained 808 is not a hit, it is
       a NOTE, and two sustained subs in the same octave BEAT: 13-16 dB of
       envelope wobble on a dissonant interval, and −5.7 dB of outright
       cancellation at unison. You cannot EQ or duck your way out of that; it is
       phase, not level.
       A kick and an 808 live at the SAME frequencies. The only thing that
       separates them is TIME — so this follower is deliberately SLOW (≈120ms
       attack). A kick is gone before it can respond; an 808 sustains long
       enough to drive it fully. Measured separation: 11.9 dB.
       Detector listens to RIOT + MΛRROW only. CULT is percussion by definition
       and its kick is already governed by the duck law — letting it in here
       would be asking the detector to un-learn the very thing it exists to do. */
    this.sbL1=0; this.sbL2=0; this.sbEnv=0; this.bedG=1; this.bedT=1;
    this.extC=0;   /* ATMOS law routing. 0 = apply duck+yield HERE (legacy,
       whole channel — would flatten BEDROCK too). 1 = the M01 face declared
       lawcap: the mixer keeps COMPUTING the law (the brain stays in the
       chassis) but FORWARDS it for internal application — throne only,
       the felt floor never flinches. */
    /* per-channel duck gains with DOCTRINE recovery constants:
       MΛRROW returns fastest (the sub must come back), RIOT medium,
       ATMOS slowest (it is the bed, not the punch) */
    this.dgA=1; this.dgC=1; this.dgD=1;
    this.relA=1-Math.exp(-1/(0.18*sampleRate));
    this.relC=1-Math.exp(-1/(0.35*sampleRate));
    this.relD=1-Math.exp(-1/(0.12*sampleRate));
    this.cLoL=0; this.cLoR=0;                    /* ATMOS low split (yield) */
    this.kLo=1-Math.exp(-2*Math.PI*110/sampleRate);
    this.aA=1-Math.exp(-1/(0.003*sampleRate));
    this.aR=1-Math.exp(-1/(0.14*sampleRate));
    this.cR=1-Math.exp(-1/(0.15*sampleRate));    /* glue: 150 ms release;
                                                    attack is INSTANT — an
                                                    8 ms attack let transients
                                                    leak past the detector and
                                                    the makeup then AMPLIFIED
                                                    them (crest went up) */
    this.fr=0;
  }
  pushRec(L,R,n){
    let o=0;
    while(o<n){
      const take=Math.min(n-o, 8192-this.stgN);
      this.stgL.set(L.subarray(o,o+take), this.stgN);
      this.stgR.set(R.subarray(o,o+take), this.stgN);
      this.stgN+=take; o+=take;
      if(this.stgN>=8192){
        this.recL.push(new Float32Array(this.stgL));
        this.recR.push(new Float32Array(this.stgR));
        this.stgN=0;
      }
    }
    this.recTotal+=n;
  }
  flushRecStaging(){                 /* catch a partial trailing chunk on stop */
    if(this.stgN>0){
      this.recL.push(new Float32Array(this.stgL.subarray(0,this.stgN)));
      this.recR.push(new Float32Array(this.stgR.subarray(0,this.stgN)));
      this.stgN=0;
    }
  }
  sendParts(){                       /* each recL[i]/recR[i] is ALREADY a safe
      on-device part size (≤8192 samples = ≤32KB/ch) — no re-grouping needed,
      unlike the old array of 128-sample buffers that had to be concatenated
      into parts after the fact. Ship each chunk as its own part, in order. */
    const parts=this.recL.length;
    try{
      for(let g2=0; g2<parts; g2++)
        this.port.postMessage(['wavpart', g2, parts, this.recL[g2], this.recR[g2]]);
      this.port.postMessage(['wavend', parts]);
    }catch(err){ this.port.postMessage(['recerr', String(err&&err.message||err)]); }
    this.recL=[]; this.recR=[]; this.recTotal=0;
  }
  process(inputs, outputs, P){
    const A=inputs[0], B=inputs[1], Cn=inputs[2], Dn=inputs[3], out=outputs[0];
    const L=out[0], R=out[1]||out[0], n=L.length;
    const lvlA=P.lvlA[0], lvlB=P.lvlB[0], lvlC=P.lvlC[0], lvlD=P.lvlD[0],
          dkA=P.duckA[0], dkC=P.duckC[0], dkD=P.duckD[0], yC=P.yieldC[0],
          glue=P.glue[0], mas=P.master[0], ghp=P.glueHp[0], ybed=P.yieldB[0];
    const THR=0.32, INVR=1-1/3;                  /* glue: soft 3:1 over −10 dB */
    const kD=1-Math.exp(-6.28318530718*(20*Math.pow(20,ghp))/sampleRate);
    const kSB=1-Math.exp(-6.28318530718*90/sampleRate);          /* 90Hz, 2-pole */
    const kSA=1-Math.exp(-1/(0.120*sampleRate));                 /* 120ms attack */
    const kSR=1-Math.exp(-1/(0.250*sampleRate));                 /* 250ms release */
    for(let s=0;s<n;s++){
      const aL=A&&A[0]?A[0][s]:0, aR=A&&A[1]?A[1][s]:(A&&A[0]?A[0][s]:0);
      const bL=B&&B[0]?B[0][s]:0, bR=B&&B[1]?B[1][s]:(B&&B[0]?B[0][s]:0);
      const inCL=Cn&&Cn[0]?Cn[0][s]:0, inCR=Cn&&Cn[1]?Cn[1][s]:(Cn&&Cn[0]?Cn[0][s]:0);
      const inDL=Dn&&Dn[0]?Dn[0][s]:0, inDR=Dn&&Dn[1]?Dn[1][s]:(Dn&&Dn[0]?Dn[0][s]:0);
      /* sidechain followers on the pre-level module signals */
      const am=Math.max(aL<0?-aL:aL, aR<0?-aR:aR);
      const bm=Math.max(bL<0?-bL:bL, bR<0?-bR:bR);
      this.envA += (am-this.envA)*(am>this.envA?this.aA:this.aR);
      this.envB += (bm-this.envB)*(bm>this.envB?this.aA:this.aR);
      const dmm=Math.max(inDL<0?-inDL:inDL, inDR<0?-inDR:inDR);
      this.envD += (dmm-this.envD)*(dmm>this.envD?this.aA:this.aR);
      /* ═ SIDECHAIN LAW: the drums are THE pump source. Per-channel
         depths, per-channel recovery — percussion rents TIME, and this
         is the eviction machinery that makes the lease enforceable. ═ */
      const dF=Math.min(1,this.envB*2.5);
      const tA=1-dkA*0.9*dF, tC=1-dkC*0.9*dF, tD=1-dkD*0.9*dF;
      this.dgA = tA<this.dgA ? tA : this.dgA+(tA-this.dgA)*this.relA;
      this.dgC = tC<this.dgC ? tC : this.dgC+(tC-this.dgC)*this.relC;
      this.dgD = tD<this.dgD ? tD : this.dgD+(tD-this.dgD)*this.relD;
      /* ═ ABYSS YIELD (zoning decree, automated): the <110Hz slice is
         single-occupancy. MΛRROW's presence evicts ATMOS's lows; when
         MΛRROW goes silent, ATMOS gets the abyss back. ═ */
      this.cLoL += (inCL-this.cLoL)*this.kLo;
      this.cLoR += (inCR-this.cLoR)*this.kLo;
      const yv=yC*Math.min(1,this.envD*3);
      const cUL=inCL-this.cLoL*yv, cUR=inCR-this.cLoR*yv;
      /* ═ SUB-OCCUPANCY: the floor steps aside for a NOTE, never for a HIT ═
         RIOT + MΛRROW, mono-summed, low-passed to 90Hz, then a deliberately
         SLOW follower. This is the whole trick: a kick and an 808 sit in the
         SAME frequencies and only TIME tells them apart. */
      const sbIn=(aL+aR+inDL+inDR)*0.5;
      this.sbL1 += (sbIn-this.sbL1)*kSB;
      this.sbL2 += (this.sbL1-this.sbL2)*kSB;
      const sbA=this.sbL2<0?-this.sbL2:this.sbL2;
      this.sbEnv += (sbA-this.sbEnv)*(sbA>this.sbEnv?kSA:kSR);
      /* SQUARED, not linear. A linear map wastes the detector: the 808 slams
         into the clamp while the kick still climbs a third of the way, and the
         11.9 dB the follower worked so hard to separate collapses to under 4.
         Squaring is an expander — it holds the quiet thing down and lets the
         loud thing through — and x*x is free, which pow() is not. */
      const sbq=this.sbEnv*2.5;

      this.bedG += (this.bedT-this.bedG)*0.0008;   /* ~26ms smoothing: this gain

      /* GLUE: peak-following feed-forward comp, parallel-blended.
         The detector LISTENS HIGH-PASSED and the gain lands FULL-BAND.
         A broadband detector is how the floor ends up paying for the drums:
         with VAPOR+MΛRROW in, the drum layer measured 3.7 dB down against the

      this.hR2+=(h2-this.hR2)*kD; const dR=h2-this.hR2;

      if(this.hL1>-1e-15&&this.hL1<1e-15) this.hL1=0;   /* subnormals stall ARM */
      if(this.hL2>-1e-15&&this.hL2<1e-15) this.hL2=0;
      if(this.hR1>-1e-15&&this.hR1<1e-15) this.hR1=0;

        const here=T.cnt+o;
        if(here<T.pre){                           /* warm phase: skip */
          o += Math.min(n-o, T.pre-here);
        } else if(here<all){
          const take=Math.min(n-o, all-here);
          this.lpBufL.set(L.subarray(o,o+take), this.lpWrite);
          this.lpBufR.set(R.subarray(o,o+take), this.lpWrite);
          this.lpWrite+=take;
          /* loopedge posts ~21ms EARLY: the stop-all it triggers must cross
             UI + iframe boundaries, so we lead the target by the typical
             latency. Capture window is untouched (sample-exact); this only
             tightens WHEN the transport halts for the ring-out. Seamless

             copy is still an allocation, but there are only ~keep/8192 of

         Worse: hitting it stopped the recording, posted 'recfull', and THREW THE
         AUDIO AWAY — the main thread only arms wavParts on 'recack'/'loopack',

      if(this.recTotal > sampleRate*120){
        this.rec=false;
        this.flushRecStaging();

        this.port.postMessage(['recack', 0, this.recL.length]);

         recovery, yv the abyss eviction. M01 slews 12ms on arrival so the

      this.port.postMessage(['claw', this.dgC, yC*Math.min(1,this.envD*3), this.bedG]);

    buildRail('duckA','CULT ⤓ RIOT','melody-adjacent · med recovery');

    buildRail('duckD','CULT ⤓ MΛRROW','the sacred pair · fast recovery');

/* ═══════════ HOSTED WORKLETS — ONE CONTEXT FOR THE WHOLE CHASSIS ═══════════

   MediaStreamDestination → MediaStreamSource bridge. Five contexts, five output
   streams, four bridges spanning four INDEPENDENT CLOCK DOMAINS. That bridge is
   the glitchiest path in Web Audio, and on a phone it underran the instant a
   second module woke — which is exactly what the crackle was: the export was
   always clean, because the mixer COMPUTED the right samples. Only delivery failed.
   Now the module ships us its worklet source, we load it into OUR context, we own
   the node, and its UI drives that node down a postMessage pipe.
   One context. One clock. No bridges. The legacy MediaStream path below still
   works, so an un-updated module degrades instead of going silent. */
const wlNodes={}, wlAnal={}, wlGain={}, wlReg=new Set();

function mixerOnce(){ if(!_mixP) _mixP=ensureMixer(); return _mixP; }

async function wlMount(win, d){

       THE FACE YOU ARE LOOKING AT IS LIVE. EVERY OTHER MODULE IS A STREAM.

   A stream is that module's own output, rendered offline once and played back
   from a buffer. Same synth, same law, same notes — but an AudioBufferSourceNode
   is native code doing a memcpy, where the live worklet is an oscillator bank.
   One live module + three streams costs about a quarter of what four live
   engines cost, and the difference is the difference between a phone that plays
   and a phone that crackles.

        }
      if(!running) break;
      const edge=nextEdge();
      for(const m of mods){
        if(m===face_){ if(streams[m]) toLive(m, edge); }
        else if(!streams[m] && bufs[m]) startStream(m, bufs[m], edge, false);
      }
      if(!FACES[face] || FACES[face].mod===face_) break;   /* stable: done */
    }
  }catch(err){ hintFlash('⚠ stream: '+(err&&err.message||err)); }
  swapping=false;
}
function stopStreams(){
  /* NOT an instant kill. src.stop() mid-waveform is a hard chop — and in a
     ring-out capture the tail slot recorded exactly that: the live face rang
     out while every STREAM was cut dead on the loop edge (audibly, and it
     read as "those modules weren't there"). An 80ms fade is short enough to
     stay a stop and long enough not to be a cliff. Sources are still
     guaranteed dead: stop() is scheduled, disconnect follows after. */
  const t0 = mctx ? mctx.currentTime : 0;
  const dying=[];
  for(const m of Object.keys(streams)){
    const s2=streams[m]; if(!s2) continue;
    try{ s2.gain.gain.cancelScheduledValues(t0);
         s2.gain.gain.setValueAtTime(s2.gain.gain.value, t0);
         s2.gain.gain.linearRampToValueAtTime(0, t0+0.08); }catch(_){}
    try{ s2.src.stop(t0+0.1); }catch(_){}
    dying.push(s2);
    delete streams[m];
  }
  const orphans=[...allSrcs]; allSrcs.clear();   /* nothing survives STOP. Nothing. */
  for(const sc of orphans){ try{ sc.stop(t0+0.1); }catch(_){} }
  setTimeout(()=>{
    for(const s2 of dying){ try{ s2.src.disconnect(); s2.gain.disconnect(); }catch(_){} }
    for(const sc of orphans){ try{ sc.disconnect(); }catch(_){} }
  }, 250);
  for(const m of Object.keys(wlNodes)) if(wlNodes[m])
    { try{ wlNodes[m].port.postMessage(['play',0]); }catch(_){} }
  for(const m of Object.keys(wlGain)){
    const g2=wlGain[m]; if(g2){ try{ g2.gain.cancelScheduledValues(0);
      g2.gain.value=1; }catch(_){} }
  }
  
  document.querySelectorAll('.led').forEach(l => l.classList.remove('streaming'));
  updateChassisStatus();
}

/* ═ wrap-around fold: make sample M−1 flow into sample 0 by construction ═
   Playback wraps M−1 → 0. After the fold, out[0] IS the recorded sample that
   followed in[M−1] — so the splice is continuous, not merely smoothed. Over
   the next X samples we blend from that continuation into the loop's real
   head, and from X onward the body is untouched.
   LINEAR, not equal-power: the two passes are the SAME music in phase, so
   they sum COHERENTLY — a sin/cos fade would put a +3dB bump squarely on the
   downbeat. Coherent content wants t + (1−t) = 1. */
function foldWrap(L,R,M,X){
  for(let i=0;i<X;i++){
    const t=i/X, u=1-t;
    L[i]=L[i]*t + L[M+i]*u;
    R[i]=R[i]*t + R[M+i]*u;
  }
  return [L.subarray(0,M), R.subarray(0,M)];
}
function wavStereo32f(L,R,rate){
  const n=L.length, data=new Float32Array(n*2);
  for(let i=0;i<n;i++){ data[i*2]=L[i]; data[i*2+1]=R[i]; }
  const bytes=data.length*4, buf=new ArrayBuffer(58+bytes), v=new DataView(buf);
  const W=(o,s2)=>{for(let i=0;i<s2.length;i++)v.setUint8(o+i,s2.charCodeAt(i));};
  W(0,'RIFF'); v.setUint32(4,50+bytes,true); W(8,'WAVE');
  W(12,'fmt '); v.setUint32(16,18,true); v.setUint16(20,3,true); v.setUint16(22,2,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*8,true); v.setUint16(32,8,true);
  v.setUint16(34,32,true); v.setUint16(36,0,true);
  W(38,'fact'); v.setUint32(42,4,true); v.setUint32(46,n,true);
  W(50,'data'); v.setUint32(54,bytes,true);
  /* byte copy — a Float32Array VIEW at offset 58 throws (58 % 4 ≠ 0);
     this exact RangeError was the silent capture killer */
  new Uint8Array(buf,58).set(new Uint8Array(data.buffer));
  return new Blob([buf],{type:'audio/wav'});
}
function finishCapture(L,R){
  if(!L || !L.length){ hintFlash('⏺ capture was empty — was anything playing?'); return; }
  const meta=loopMeta; loopMeta=null;
  let folded=false;
  if(meta && meta.xfN>0 && L.length>=meta.mainN+meta.xfN){
    const out=foldWrap(L,R,meta.mainN,meta.xfN);
    L=out[0]; R=out[1]; folded=true;
  }
  const ts=new Date().toISOString().slice(11,19).replace(/:/g,'');
  const name=(meta ? 'substrate-loop-'+meta.bpm+'bpm-'+meta.bars+'bar'
                        +(meta.tail?'-tail'+meta.tail+'s':'-seamless')
                       : 'substrate-session')+'-'+ts+'.wav';
  const blob=wavStereo32f(L,R,mctx.sampleRate);
  const url=URL.createObjectURL(blob);
  const file=new File([blob],name,{type:'audio/wav'});
  const canShare=!!(navigator.canShare && navigator.canShare({files:[file]}));
  const embedded=window.top!==window;
  /* polite auto-attempt (works when we're the top page and policy allows) */
  const a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  /* the guarantee bar. Tap → Android SHARE SHEET first (system UI — it
     cannot fail silently; save to Files/Drive from there). Anchor
     download is the fallback for desktop. An embedding host without
     allow-downloads blocks anchors with NO error — share sheet is immune. */
  const chip=$('saveChip');
  chip.href=url; chip.download=name;
  chip.textContent=(canShare?'⇪ SAVE / SHARE ':'⇓ SAVE ')+name
    +' · '+(L.length/mctx.sampleRate).toFixed(1)+'s'
    +(folded?' · wrap-folded':'')
    +(embedded?' · ⚠ embedded host — use share':'');
  chip.classList.add('show');
  chip.onclick=(e)=>{
    if(canShare){
      e.preventDefault();
      navigator.share({files:[file], title:name})
        .then(()=>hintFlash('⇪ handed to the system — pick Files/Drive to save'))
        .catch(err=>{ if(String(err).indexOf('Abort')<0)
          hintFlash('✕ share failed: '+(err&&err.message||err)); });
      return;
    }
    setTimeout(()=>{ chip.classList.remove('show');
      URL.revokeObjectURL(url); },800);
  };
  hintFlash('⇓ capture ready — tap the red bar'+(canShare?' for the share sheet':''));
}
$('xClose').addEventListener('click',()=>{
  if(window.parent!==window) parent.postMessage({src:'srcd-duo',cmd:'close'},'*');
  else if(history.length>1) history.back();
  else $('hint').textContent='STANDALONE MODE — CLOSE THE TAB TO EXIT';
});
setTimeout(()=>$('hint').style.opacity=0, 7000);
</script>
