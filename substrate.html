<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EVANSCIRA LABS // SUBSTRΛTΞ</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050607;--edge:#1c2226;--txt:#cfd8dc;--dim:#5c686e;
  --riot:#43ffa4;--cult:#ff4d3d;--sub:#8ab8ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Chakra Petch',monospace;display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none}
#plate{display:flex;align-items:center;gap:10px;padding:7px 12px;
  border-bottom:1px solid var(--edge);background:#07090b;flex-shrink:0}
#plate .corp{font-size:9px;letter-spacing:.3em;color:var(--dim);
  flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#plate .corp b{color:var(--txt);font-weight:600}
#plate .modDot{font-size:9px;letter-spacing:.14em;flex-shrink:0;padding:3px 6px;
  border:1px solid var(--edge);border-radius:3px;transition:color .25s}
#plate .modDot.riot{color:var(--riot)} #plate .modDot.cult{color:var(--cult)}
#plate .modDot.atmo{color:#b48aff}
.runes{display:flex;gap:4px;margin-left:8px;flex-shrink:0}
/* EVANSCIRA AR sigils: SVG reticles — corner brackets drawn in, so no
   text-flow can ever stack them */
.rune{background:transparent;border:none;padding:0;cursor:pointer;
  width:38px;height:32px;flex-shrink:0;color:var(--sub)}
.rune svg{width:100%;height:100%;overflow:visible}
.rune .crn{fill:none;stroke:var(--dim);stroke-width:1.4;opacity:.7}
.rune .gly{fill:none;stroke:currentColor;stroke-width:1.7;stroke-linejoin:round;
  filter:drop-shadow(0 0 4px currentColor)}
.rune:active .gly{fill:currentColor;fill-opacity:.25}
#capBtn .g-save{display:none}
#capBtn.rec{color:var(--cult)}
#capBtn.rec .g-rec{display:none}
#capBtn.rec .g-save{display:block;animation:pulse 1.1s infinite}
@keyframes pulse{50%{opacity:.35;filter:drop-shadow(0 0 1px currentColor)}}
#xClose{font-family:inherit;font-size:12px;background:transparent;color:var(--dim);
  border:1px solid var(--edge);padding:5px 11px;cursor:pointer;letter-spacing:.1em;
  border-radius:3px;margin-left:8px;flex-shrink:0;white-space:nowrap}
#xClose:active{color:var(--txt)}
/* ═ the SUBSTRΛTΞ mixer: discreet LEDs, faders on demand ═ */
#mixer{display:flex;gap:6px;align-items:center;padding:5px 10px;
  border-bottom:1px solid var(--edge);background:#060809;flex-shrink:0}
#dots{display:flex;gap:4px;flex:1;min-width:0}
.led{font-family:inherit;font-size:8px;letter-spacing:.1em;color:var(--dim);
  background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:2px 5px;min-width:34px}
.led i{width:8px;height:8px;border-radius:50%;background:var(--c);
  box-shadow:0 0 6px var(--c);opacity:.85;transition:transform .15s}
.led.open{color:var(--txt)}
.led.open i{transform:scale(1.5);box-shadow:0 0 12px var(--c)}
#meter{font-size:11px;letter-spacing:.06em;color:var(--dim);min-width:66px;
  text-align:right;font-variant-numeric:tabular-nums}
#meter.g{color:var(--riot)} #meter.a{color:#ffb03d} #meter.r{color:var(--cult)}
#expand{display:none;padding:8px 12px 10px;border-bottom:1px solid var(--edge);
  background:#04070a}
#expand.open{display:block}
#expand .xlbl{display:flex;justify-content:space-between;font-size:9px;
  letter-spacing:.14em;color:var(--dim);margin-bottom:4px}
#expand .xlbl .v{color:var(--txt);font-size:11px}
#expand .rail{height:34px;background:#0c1013;border:1px solid var(--edge);
  position:relative;border-radius:4px;overflow:hidden;touch-action:none;cursor:ew-resize}
#expand .fill{position:absolute;left:0;top:0;bottom:0;background:var(--sub);opacity:.55}
#expand .gr{position:absolute;right:0;top:0;bottom:0;background:#ffb03d;opacity:.7;width:0}
#expand select{font-family:inherit;font-size:10px;background:#0c1013;color:var(--sub);
  border:1px solid var(--edge);padding:5px;border-radius:3px;margin-bottom:6px;width:100%}
#thumbBub{position:fixed;display:none;background:#0c1013;border:1px solid var(--sub);
  color:var(--txt);font-size:12px;padding:3px 8px;border-radius:3px;pointer-events:none;
  z-index:50;transform:translate(-50%,-140%);letter-spacing:.04em}
#capCfg{display:none;background:#0a0d10;border-bottom:1px solid var(--edge);
  padding:8px 12px;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
#capCfg.show{display:flex}
#capCfg .cl{font-size:8px;letter-spacing:.14em;color:var(--dim)}
#capCfg input,#capCfg select{font-family:inherit;font-size:11px;background:#0c1013;
  color:var(--txt);border:1px solid var(--edge);padding:5px;border-radius:3px;width:auto}
#capCfg input{width:52px}
#capCfg button{font-family:inherit;font-size:10px;letter-spacing:.08em;background:transparent;
  color:var(--sub);border:1px solid var(--sub);padding:6px 10px;border-radius:3px;cursor:pointer}
#capCfg #cGo{color:var(--riot);border-color:var(--riot)}
#saveChip{display:none;background:#140a0b;border-bottom:1px solid var(--cult);
  color:var(--txt);font-size:12px;letter-spacing:.06em;padding:10px 14px;
  text-decoration:none;text-align:center;flex-shrink:0;
  box-shadow:inset 0 0 20px rgba(255,77,61,.15)}
#saveChip.show{display:block}
/* in normal flow between mixer and faces: nothing can cover it */
#faces{position:relative;flex:1;overflow:hidden}
.face{position:absolute;inset:0;border:0;width:100%;height:100%;
  transition:transform .28s cubic-bezier(.6,0,.3,1),visibility .28s}
.face.off-l{transform:translateX(-102%);visibility:hidden;pointer-events:none}
.face.off-r{transform:translateX(102%);visibility:hidden;pointer-events:none}
.face.on{transform:translateX(0);visibility:visible}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--dim);letter-spacing:.14em;pointer-events:none;
  opacity:1;transition:opacity 1s;text-align:center;width:92%}
</style>
</head>
<body>
<div id="plate">
  <div class="corp"><b>EVANSCIRA</b> LABS // SUBSTRΛTΞ</div>
  <div class="modDot atmo" id="modName" title="active face">M01</div>
  <div class="runes">
    <button id="runAll" class="rune" title="start every powered face">
      <svg viewBox="0 0 36 30">
        <path class="crn" d="M2 9V2h7M27 2h7v7M34 21v7h-7M9 28H2v-7"/>
        <path class="gly" d="M14 9.5L25 15l-11 5.5z"/>
      </svg></button>
    <button id="stopAll" class="rune" title="stop every powered face">
      <svg viewBox="0 0 36 30">
        <path class="crn" d="M2 9V2h7M27 2h7v7M34 21v7h-7M9 28H2v-7"/>
        <rect class="gly" x="13" y="10" width="10" height="10"/>
      </svg></button>
    <button id="capBtn" class="rune" title="record the session bus — exactly as heard; tap again to stop & save">
      <svg viewBox="0 0 36 30">
        <path class="crn" d="M2 9V2h7M27 2h7v7M34 21v7h-7M9 28H2v-7"/>
        <circle class="gly g-rec" cx="18" cy="15" r="5.5"/>
        <g class="gly g-save">
          <path d="M18 7v9M13.5 12.5L18 17l4.5-4.5"/>
          <path d="M11 21.5h14"/>
        </g>
      </svg></button>
  </div>
  <button id="xClose">✕ CONSOLE</button>
</div>

<div id="mixer">
  <div id="dots">
    <button class="led" id="dAtmo"  data-key="lvlC"   style="--c:#b48aff"><i></i>ATMO</button>
    <button class="led" id="dRiot"  data-key="lvlA"   style="--c:var(--riot)"><i></i>RIOT</button>
    <button class="led" id="dCult"  data-key="lvlB"   style="--c:var(--cult)"><i></i>CULT</button>
    <button class="led" id="dSC"    data-key="duckAmt"style="--c:var(--sub)"><i></i>SC</button>
    <button class="led" id="dGlue"  data-key="glue"   style="--c:#ffb03d"><i></i>GLUE</button>
    <button class="led" id="dMas"   data-key="master" style="--c:#e8eef3"><i></i>MST</button>
  </div>
  <div id="meter" title="session bus level, pre-limiter — aim around −6 dB">−∞ dB</div>
</div>
<div id="expand"></div>
<div id="capCfg">
  <span class="cl">BPM</span><input id="cBpm" type="number" min="40" max="220" value="120" inputmode="numeric">
  <span class="cl">BARS</span><select id="cBars"><option>1</option><option selected>2</option><option>4</option><option>8</option></select>
  <span class="cl">TAIL</span><select id="cTail"><option value="cut">cut · seamless</option>
    <option value="1">1s ring-out</option><option value="2" selected>2s ring-out</option><option value="4">4s ring-out</option></select>
  <button id="cGo">⏱ LOOP GRAB</button>
  <button id="cFree">⏺ FREE REC</button>
</div>
<a id="saveChip"></a>
<div id="thumbBub"></div>

<div id="faces">
  <iframe class="face on" id="fAtmo" src="vapor_throne.html" allow="autoplay"></iframe>
  <iframe class="face off-r" id="fRiot" data-src="overtone_riot.html" allow="autoplay"></iframe>
  <iframe class="face off-r" id="fCult" data-src="battery_cult.html" allow="autoplay"></iframe>
  <div id="hint">⫷ ⫸ IN A MODULE TITLE SWITCHES THE FACE · BOTH ENGINES STAY LIVE ·
    THE STRIP ABOVE IS THE SESSION MIXER — LEVELS, MODULE⤓MODULE SIDECHAIN, GLUE, MASTER</div>
</div>

<script>
"use strict";
/* ═════════ EVANSCIRA LABS // SUBSTRΛTΞ ═════════
   Unified low-end session console. Hosts MODULE 01 (OVERTONE_RIOT — sub /
   808 / pluck synthesis) and MODULE 02 (BΛTTΞRY CULT — sampler percussion)
   as live faces over one session mixer: per-module level, module⤓module
   sidechain, master GLUE compression, master fader. Levels + duck + glue
   only — no plugin processing lives here; the modules are the instruments.
   Dashboard contract: ✕ posts {src:'srcd-duo', cmd:'close'} when embedded.
   Rebrand point: the one string below.                                   */
const BRAND = "EVANSCIRA LABS // SUBSTRΛTΞ";

const MIXER_WORKLET = `
class SubstrateMix extends AudioWorkletProcessor {
  static get parameterDescriptors(){ return [
    {name:'lvlA', defaultValue:0.9, minValue:0, maxValue:1},
    {name:'lvlB', defaultValue:0.9, minValue:0, maxValue:1},
    {name:'lvlC', defaultValue:0.8, minValue:0, maxValue:1},
    {name:'duckMode', defaultValue:0, minValue:0, maxValue:4},
    {name:'duckAmt', defaultValue:0.6, minValue:0, maxValue:1},
    {name:'glue', defaultValue:0, minValue:0, maxValue:1},
    {name:'master', defaultValue:0.9, minValue:0, maxValue:1},
  ];}
  constructor(){ super();
    this.rec=false; this.recL=[]; this.recR=[];
    this.port.onmessage = e => {
      if(e.data[0]==='rec'){
        if(e.data[1]){ this.recL=[]; this.recR=[]; this.rec=true;
          this.port.postMessage(['recack',1,0]);
        } else if(this.rec){
          this.rec=false;
          this.port.postMessage(['recack',0,this.recL.length]);
          /* CHUNKED delivery: one giant transferred message died silently
             on-device — small cloned slices survive anything, and their
             progress is visible. 64 blocks ≈ 8192 samples per part. */
          try{
            const GRP=64, parts=Math.ceil(this.recL.length/GRP);
            for(let g2=0; g2<parts; g2++){
              const seg=this.recL.slice(g2*GRP,(g2+1)*GRP);
              const segR=this.recR.slice(g2*GRP,(g2+1)*GRP);
              const n=seg.reduce((q,b)=>q+b.length,0);
              const L=new Float32Array(n), R=new Float32Array(n);
              let o=0; for(let i=0;i<seg.length;i++){
                L.set(seg[i],o); R.set(segR[i],o); o+=seg[i].length; }
              this.port.postMessage(['wavpart', g2, parts, L, R]);
            }
            this.port.postMessage(['wavend', parts]);
          }catch(err){
            this.port.postMessage(['recerr', String(err&&err.message||err)]);
          }
          this.recL=[]; this.recR=[];
        } else {
          this.port.postMessage(['recack',-1,0]);  /* stop with nothing armed */
        }
      }
      if(e.data[0]==='recloop'){
        /* scheduled capture: skip pre samples (one warm loop — FX build
           exactly like RIOT's offline pre-roll), record main+tail samples
           SAMPLE-EXACTLY (partial blocks sliced), announce the main/tail
           edge so the chassis can stop the transport for ring-out tails */
        this.lp={pre:e.data[1], main:e.data[2], tail:e.data[3], cnt:0};
        this.recL=[]; this.recR=[]; this.rec=false;
        this.port.postMessage(['loopack', e.data[1], e.data[2], e.data[3]]);
      }
      if(e.data[0]==='recloopcancel'){ this.lp=null; this.recL=[]; this.recR=[]; }
    };
    this.envA=0; this.envB=0; this.cEnv=0; this.gr=1; this.pk=0;
    this.aA=1-Math.exp(-1/(0.003*sampleRate));
    this.aR=1-Math.exp(-1/(0.14*sampleRate));
    this.cR=1-Math.exp(-1/(0.15*sampleRate));    /* glue: 150 ms release;
                                                    attack is INSTANT — an
                                                    8 ms attack let transients
                                                    leak past the detector and
                                                    the makeup then AMPLIFIED
                                                    them (crest went up) */
    this.fr=0;
  }
  process(inputs, outputs, P){
    const A=inputs[0], B=inputs[1], Cn=inputs[2], out=outputs[0];
    const L=out[0], R=out[1]||out[0], n=L.length;
    const lvlA=P.lvlA[0], lvlB=P.lvlB[0], lvlC=P.lvlC[0], dm=Math.round(P.duckMode[0]),
          dAmt=P.duckAmt[0], glue=P.glue[0], mas=P.master[0];
    const THR=0.32, INVR=1-1/3;                  /* glue: soft 3:1 over −10 dB */
    for(let s=0;s<n;s++){
      const aL=A&&A[0]?A[0][s]:0, aR=A&&A[1]?A[1][s]:(A&&A[0]?A[0][s]:0);
      const bL=B&&B[0]?B[0][s]:0, bR=B&&B[1]?B[1][s]:(B&&B[0]?B[0][s]:0);
      const inCL=Cn&&Cn[0]?Cn[0][s]:0, inCR=Cn&&Cn[1]?Cn[1][s]:(Cn&&Cn[0]?Cn[0][s]:0);
      /* sidechain followers on the pre-level module signals */
      const am=Math.max(aL<0?-aL:aL, aR<0?-aR:aR);
      const bm=Math.max(bL<0?-bL:bL, bR<0?-bR:bR);
      this.envA += (am-this.envA)*(am>this.envA?this.aA:this.aR);
      this.envB += (bm-this.envB)*(bm>this.envB?this.aA:this.aR);
      /* duck matrix — the drums own the pushdown:
         1 CULT⤓RIOT · 2 RIOT⤓CULT · 3 CULT⤓ATMOS · 4 CULT⤓EVERYTHING */
      let gA=1, gB=1, gC=1;
      const dB=this.envB*2.5, dd=1 - dAmt*0.9*(dB>1?1:dB);
      if(dm===1) gA=dd;
      else if(dm===2){ const d=this.envA*2.5; gB = 1 - dAmt*0.9*(d>1?1:d); }
      else if(dm===3) gC=dd;
      else if(dm===4){ gA=dd; gC=dd; }
      let L0=aL*lvlA*gA + bL*lvlB*gB + inCL*lvlC*gC;
      let R0=aR*lvlA*gA + bR*lvlB*gB + inCR*lvlC*gC;
      /* GLUE: peak-following feed-forward comp, parallel-blended */
      const pk=Math.max(L0<0?-L0:L0, R0<0?-R0:R0);
      if(pk>this.cEnv) this.cEnv=pk;             /* instant attack */
      else this.cEnv += (pk-this.cEnv)*this.cR;
      const over=this.cEnv/THR;
      const grT = over>1 ? Math.pow(over,-INVR) : 1;
      this.gr += (grT-this.gr)*0.2;              /* smoothed gain move */
      const mk=1.2;                               /* makeup */
      const cL=L0*this.gr*mk, cR=R0*this.gr*mk;
      L0 = L0*(1-glue) + cL*glue;
      R0 = R0*(1-glue) + cR*glue;
      const preL=L0*mas*1.1, preR=R0*mas*1.1;   /* meter reads PRE-limiter:
                                                     clip risk visible before
                                                     the tanh hides it */
      const pa=Math.max(preL<0?-preL:preL, preR<0?-preR:preR);
      if(pa>this.pk) this.pk=pa;
      L[s]=Math.tanh(preL);
      R[s]=Math.tanh(preR);
    }
    if(this.lp){
      const T=this.lp, all=T.pre+T.main+T.tail;
      let o=0;
      while(o<n && this.lp){
        const here=T.cnt+o;
        if(here<T.pre){                           /* warm phase: skip */
          o += Math.min(n-o, T.pre-here);
        } else if(here<all){
          const take=Math.min(n-o, all-here);
          this.recL.push(new Float32Array(L.subarray(o,o+take)));
          this.recR.push(new Float32Array(R.subarray(o,o+take)));
          if(here<T.pre+T.main && here+take>=T.pre+T.main)
            this.port.postMessage(['loopedge']);  /* main done → tail begins */
          o += take;
        } else break;
      }
      if(this.lp){
        T.cnt += n;
        if(T.cnt>=all){
          this.lp=null;
          const parts=Math.ceil(this.recL.length/64);
          try{
            for(let g2=0; g2<parts; g2++){
              const seg=this.recL.slice(g2*64,(g2+1)*64), segR=this.recR.slice(g2*64,(g2+1)*64);
              const nn=seg.reduce((q,b)=>q+b.length,0);
              const Lc=new Float32Array(nn), Rc=new Float32Array(nn);
              let oo=0; for(let i=0;i<seg.length;i++){
                Lc.set(seg[i],oo); Rc.set(segR[i],oo); oo+=seg[i].length; }
              this.port.postMessage(['wavpart', g2, parts, Lc, Rc]);
            }
            this.port.postMessage(['wavend', parts]);
          }catch(err){ this.port.postMessage(['recerr', String(err&&err.message||err)]); }
          this.recL=[]; this.recR=[];
        }
      }
    }
    if(this.rec){
      this.recL.push(new Float32Array(L)); this.recR.push(new Float32Array(R));
      if(this.recL.length*128 > sampleRate*600){   /* 10 min hard ceiling */
        this.rec=false;
        this.port.postMessage(['recfull']);
      }
    }
    if((this.fr++&15)===0){
      this.port.postMessage(['gr', this.gr]);
      this.port.postMessage(['lv', 20*Math.log10(this.pk+1e-9)]);
      this.pk*=0.5;                              /* decaying peak-hold */
    }
    return true;
  }
}
registerProcessor('substrate-mix', SubstrateMix);
`;

const $=id=>document.getElementById(id);
const atmo=$('fAtmo'), riot=$('fRiot'), cult=$('fCult'), modName=$('modName');
/* session order = creative order: mood → line → beat */
const FACES=[
  {el:atmo, tag:'M01', cls:'atmo', loaded:true},
  {el:riot, tag:'M02', cls:'riot', loaded:false},
  {el:cult, tag:'M03', cls:'cult', loaded:false},
];
let face=0;
function show(f){
  face=(f+FACES.length)%FACES.length;
  const F=FACES[face];
  if(!F.loaded){ F.el.src=F.el.dataset.src; F.loaded=true; }
  FACES.forEach((q,i)=>{
    q.el.className='face '+(i===face?'on':(i<face?'off-l':'off-r'));
  });
  modName.textContent=F.tag;
  modName.className='modDot '+F.cls;
}

/* ═ session mixer ═ */
let mctx=null, mix=null;
const conf=(()=>{ try{ return JSON.parse(localStorage.getItem('substrate.mix.v1'))||{}; }
  catch(_){ return {}; } })();
const clamp01=v=>Math.min(1,Math.max(0,+v||0));
const st={ lvlA:clamp01(conf.lvlA??0.9), lvlB:clamp01(conf.lvlB??0.9),
  duckMode:conf.duckMode??0, duckAmt:clamp01(conf.duckAmt??0.6),
  glue:clamp01(conf.glue??0), master:clamp01(conf.master??0.9),
  lvlC:clamp01(conf.lvlC??0.8), capBpm:conf.capBpm??120 };
/* all channels read 0–100% — no mystery headroom above 100 */
function save(){ try{ localStorage.setItem('substrate.mix.v1',JSON.stringify(st)); }catch(_){} }
function setP(k,v){ st[k]=v; save();
  if(mix) mix.parameters.get(k).setTargetAtTime(v, mctx.currentTime, 0.02); }

/* ═ LED dots → one expanding fader at a time; value bubble rides the
   thumb so you can read the % exactly where your finger is ═ */
const CH={
  lvlC:{name:'ATMOS LEVEL',color:'#b48aff'},
  lvlA:{name:'RIOT LEVEL',color:'var(--riot)'},
  lvlB:{name:'CULT LEVEL',color:'var(--cult)'},
  duckAmt:{name:'SIDECHAIN AMOUNT',color:'var(--sub)',sc:true},
  glue:{name:'GLUE',color:'#ffb03d'},
  master:{name:'MASTER',color:'#e8eef3',gr:true},
};
const pct=v=>Math.round(v*100)+'%';
const bub=$('thumbBub');
let openKey=null;
function renderExpand(){
  const ex=$('expand');
  document.querySelectorAll('.led').forEach(b=>
    b.classList.toggle('open', b.dataset.key===openKey));
  if(!openKey){ ex.classList.remove('open'); ex.innerHTML=''; return; }
  const c=CH[openKey];
  ex.classList.add('open');
  ex.innerHTML=(c.sc?'<select id="dkMode">'
      +'<option value="0">⤓ SIDECHAIN OFF</option>'
      +'<option value="1">CULT ⤓ RIOT — drums push the bass</option>'
      +'<option value="2">RIOT ⤓ CULT — the 808 rules</option>'
      +'<option value="3">CULT ⤓ ATMOS — drums part the fog</option>'
      +'<option value="4">CULT ⤓ EVERYTHING — the classic pump</option></select>':'')
    +'<div class="xlbl"><span>'+c.name+'</span><span class="v"></span></div>'
    +'<div class="rail"><div class="fill" style="background:'+c.color+'"></div>'
    +'<div class="gr"></div></div>';
  const rail=ex.querySelector('.rail'), fill=ex.querySelector('.fill'),
        vv=ex.querySelector('.v');
  const render=()=>{ fill.style.width=(st[openKey]*100)+'%'; vv.textContent=pct(st[openKey]); };
  const drag=e=>{
    const r=rail.getBoundingClientRect();
    const x=e.touches?e.touches[0].clientX:e.clientX;
    const nn=Math.min(1,Math.max(0,(x-r.left)/r.width));
    setP(openKey,nn); render();
    bub.style.display='block';
    bub.style.left=x+'px'; bub.style.top=r.top+'px';
    bub.textContent=pct(nn);
  };
  rail.addEventListener('pointerdown',e=>{ rail.setPointerCapture(e.pointerId); drag(e);
    const mv=ev=>drag(ev),
          up=()=>{ bub.style.display='none';
            rail.removeEventListener('pointermove',mv); rail.removeEventListener('pointerup',up); };
    rail.addEventListener('pointermove',mv); rail.addEventListener('pointerup',up); });
  if(c.sc){
    const dk=ex.querySelector('#dkMode');
    dk.value=String(st.duckMode);
    dk.addEventListener('change',()=>setP('duckMode',+dk.value));
  }
  render();
}
document.querySelectorAll('.led').forEach(b=>
  b.addEventListener('click',()=>{
    openKey = openKey===b.dataset.key ? null : b.dataset.key;
    renderExpand();
  }));

async function ensureMixer(){
  if(mctx) return;
  mctx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'playback'});
  const blob=new Blob([MIXER_WORKLET],{type:'application/javascript'});
  await mctx.audioWorklet.addModule(URL.createObjectURL(blob));
  mix=new AudioWorkletNode(mctx,'substrate-mix',
    {numberOfInputs:2, outputChannelCount:[2]});
  mix.connect(mctx.destination);
  for(const k of ['lvlA','lvlB','lvlC','duckMode','duckAmt','glue','master'])
    mix.parameters.get(k).value=st[k];
  let wavParts=null, wavPartsR=null, wavGot=0;
  mix.port.onmessage=e=>{
   try{
    if(e.data[0]==='gr'){                        /* glue GR: amber bar inside the
                                                    MASTER expansion when open */
      const g=document.querySelector('#expand .gr');
      if(g && openKey==='master')
        g.style.width=(Math.min(1,Math.max(0,1-e.data[1]))*60)+'%';
    }
    if(e.data[0]==='lv'){                        /* bus dB, pre-limiter */
      const db=e.data[1], m=$('meter');
      m.textContent=(db<=-90?'−∞':(db>0?'+':'−')+Math.abs(db).toFixed(1))+' dB';
      m.className = db>-1 ? 'r' : db>-6 ? 'a' : 'g';
    }
    if(e.data[0]==='recack'){
      if(e.data[1]===1) hintFlash('⏺ RECORDING — bus armed (worklet confirmed)');
      if(e.data[1]===0){ wavParts=[]; wavPartsR=[]; wavGot=0;
        hintFlash('⏳ packaging '+e.data[2]+' blocks…'); }
      if(e.data[1]===-1) hintFlash('⚠ stop received but nothing was armed');
    }
    if(e.data[0]==='wavpart' && wavParts){
      wavParts[e.data[1]]=e.data[3]; wavPartsR[e.data[1]]=e.data[4]; wavGot++;
      if((wavGot&7)===0) hintFlash('⏳ receiving '+wavGot+'/'+e.data[2]+'…');
    }
    if(e.data[0]==='wavend' && wavParts){
      loopArmed=false; renderCap();
      const n=wavParts.reduce((q,b)=>q+(b?b.length:0),0);
      const L=new Float32Array(n), R=new Float32Array(n);
      let o=0;
      for(let i=0;i<wavParts.length;i++){ if(!wavParts[i]) continue;
        L.set(wavParts[i],o); R.set(wavPartsR[i],o); o+=wavParts[i].length; }
      wavParts=wavPartsR=null;
      finishCapture(L,R);
    }
    if(e.data[0]==='loopack'){ wavParts=[]; wavPartsR=[]; wavGot=0; }
    if(e.data[0]==='loopedge'){
      if(loopMeta && loopMeta.tail>0) broadcastTransport(0);   /* ring out */
      hintFlash(loopMeta&&loopMeta.tail>0 ? '⏱ loop done — recording the ring-out…'
                                          : '⏱ loop done — seamless cut');
    }
    if(e.data[0]==='recerr') hintFlash('✕ capture failed in worklet: '+e.data[1]);
    if(e.data[0]==='recfull'){ capArmed=false; renderCap();
      hintFlash('⏺ capture hit the 10-minute ceiling — file incoming'); }
   }catch(err){ hintFlash('✕ capture UI error: '+(err&&err.message||err)); }
  };
}
const hooked={riot:null,cult:null,atmos:null}; /* live source nodes */
window.addEventListener('message',async e=>{
  const d=e.data;
  if(!d || d.src!=='srcd-duo') return;
  if(d.cmd==='switch') show(face+(d.dir||1));
  if(d.cmd==='tap-failed'){
    $('hint').textContent='⚠ '+d.mod.toUpperCase()+' bus tap failed ('+d.err+') — module playing DIRECT, console mixer bypassed for it';
    $('hint').style.opacity=1;
  }
  if(d.cmd==='audio-ready'){
    try{
      await ensureMixer();
      if(mctx.state==='suspended') await mctx.resume();
      const frame = d.mod==='riot' ? riot : d.mod==='atmos' ? atmo : cult;
      /* a power-cycle mints a NEW context + NEW stream and re-announces —
         the chassis must drop the orphaned source and re-patch, or the
         module plays forever into a dead pipe (the post-power-cycle
         silence bug) */
      if(hooked[d.mod]){ try{ hooked[d.mod].disconnect(); }catch(_){} hooked[d.mod]=null; }
      const stream=frame.contentWindow.__srcdModuleOut;
      if(!stream) return;
      const srcN=mctx.createMediaStreamSource(stream);
      srcN.connect(mix, 0, d.mod==='riot'?0 : d.mod==='cult'?1 : 2);
      hooked[d.mod]=srcN;
      $('hint').textContent='⛁ '+d.mod.toUpperCase()+' PATCHED INTO THE SUBSTRΛTΞ BUS';
      $('hint').style.opacity=1;
      setTimeout(()=>$('hint').style.opacity=0,2500);
    }catch(err){
      $('hint').textContent='✕ bus patch failed: '+(err.message||err);
      $('hint').style.opacity=1;
    }
  }
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') show(face-1);
  if(e.key==='ArrowRight') show(face+1);
});
/* master transport — two MOMENTARY commands, zero chassis state, zero
   module feedback. ▶ALL starts every powered face that's stopped; ■ALL
   stops every powered face that's running. Module buttons stay purely
   local; separate tempos per face are a feature, not a bug. */
function broadcastTransport(on){
  const msg={src:'srcd-duo',cmd:'transport',on:on?1:0};
  for(const F of FACES) if(F.loaded){
    try{ F.el.contentWindow.postMessage(msg,'*'); }catch(_){}
  }
}
$('runAll').addEventListener('click',()=>broadcastTransport(1));
$('stopAll').addEventListener('click',()=>broadcastTransport(0));

/* ═ ⏺ CAPTURE — record the mixer's true output: levels, sidechain, glue,
   master, tanh — the session exactly as the chassis plays it. Live capture
   because the modules stream in real time; there is no offline re-render
   of a two-engine performance. 32f stereo WAV, timestamped. ═ */
let capArmed=false;
function hintFlash(t){ $('hint').textContent=t; $('hint').style.opacity=1;
  setTimeout(()=>$('hint').style.opacity=0,3500); }
function renderCap(){
  /* class only — writing textContent here once DESTROYED the SVG child
     and left a plain-text corpse. The armed glyph (save-arrow) is pure CSS. */
  $('capBtn').classList.toggle('rec',capArmed||loopArmed);
}
let loopArmed=false;
$('capBtn').addEventListener('click',()=>{
  if(!mix){ hintFlash('⏻ power a module first — the bus wakes with the first face'); return; }
  if(capArmed){                                   /* free-rec running: stop it */
    capArmed=false;
    mix.port.postMessage(['rec',0]); renderCap();
    hintFlash('⏳ packaging capture…'); return;
  }
  if(loopArmed){                                  /* loop grab running: cancel */
    loopArmed=false; mix.port.postMessage(['recloopcancel']); renderCap();
    hintFlash('✕ loop grab cancelled'); return;
  }
  $('capCfg').classList.toggle('show');           /* idle: open the ritual menu */
});
$('cFree').addEventListener('click',()=>{
  $('capCfg').classList.remove('show');
  capArmed=true;
  mix.port.postMessage(['rec',1]); renderCap();
  hintFlash('⏺ RECORDING THE SUBSTRΛTΞ BUS — raw, exactly as it plays');
});
/* ═ ⏱ LOOP GRAB — the stem-generator ritual:
   ■ ALL → let tails die → ▶ ALL + arm the counter in one breath →
   worklet skips one full warm loop (FX built, sequencers locked to step 0)
   → records EXACTLY bars → cut = seamless loop, or transport stops at the
   edge and the ring-out becomes the tail. DAW-ready, no scissors. ═ */
let loopMeta=null;
$('cBpm').value=st.capBpm;
$('cGo').addEventListener('click',()=>{
  $('capCfg').classList.remove('show');
  const bpm=Math.min(220,Math.max(40,+$('cBpm').value||120));
  const bars=+$('cBars').value, tailS=$('cTail').value==='cut'?0:+$('cTail').value;
  st.capBpm=bpm; save();
  const sr=mctx.sampleRate;
  const loopN=Math.round(bars*4*(60/bpm)*sr);
  loopMeta={bpm,bars,tail:tailS};
  broadcastTransport(0);
  hintFlash('⏱ arming — letting tails die…');
  setTimeout(()=>{
    loopArmed=true; renderCap();
    mix.port.postMessage(['recloop', loopN, loopN, Math.round(tailS*sr)]);
    broadcastTransport(1);
    hintFlash('⏱ warm loop rolling — capture begins at bar 1 of pass 2');
  }, 600);
});
function wavStereo32f(L,R,rate){
  const n=L.length, data=new Float32Array(n*2);
  for(let i=0;i<n;i++){ data[i*2]=L[i]; data[i*2+1]=R[i]; }
  const bytes=data.length*4, buf=new ArrayBuffer(58+bytes), v=new DataView(buf);
  const W=(o,s2)=>{for(let i=0;i<s2.length;i++)v.setUint8(o+i,s2.charCodeAt(i));};
  W(0,'RIFF'); v.setUint32(4,50+bytes,true); W(8,'WAVE');
  W(12,'fmt '); v.setUint32(16,18,true); v.setUint16(20,3,true); v.setUint16(22,2,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*8,true); v.setUint16(32,8,true);
  v.setUint16(34,32,true); v.setUint16(36,0,true);
  W(38,'fact'); v.setUint32(42,4,true); v.setUint32(46,n,true);
  W(50,'data'); v.setUint32(54,bytes,true);
  /* byte copy — a Float32Array VIEW at offset 58 throws (58 % 4 ≠ 0);
     this exact RangeError was the silent capture killer */
  new Uint8Array(buf,58).set(new Uint8Array(data.buffer));
  return new Blob([buf],{type:'audio/wav'});
}
function finishCapture(L,R){
  if(!L || !L.length){ hintFlash('⏺ capture was empty — was anything playing?'); return; }
  const ts=new Date().toISOString().slice(11,19).replace(/:/g,'');
  const name=(loopMeta ? 'substrate-loop-'+loopMeta.bpm+'bpm-'+loopMeta.bars+'bar'
                        +(loopMeta.tail?'-tail'+loopMeta.tail+'s':'-seamless')
                       : 'substrate-session')+'-'+ts+'.wav';
  loopMeta=null;
  const blob=wavStereo32f(L,R,mctx.sampleRate);
  const url=URL.createObjectURL(blob);
  const file=new File([blob],name,{type:'audio/wav'});
  const canShare=!!(navigator.canShare && navigator.canShare({files:[file]}));
  const embedded=window.top!==window;
  /* polite auto-attempt (works when we're the top page and policy allows) */
  const a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  /* the guarantee bar. Tap → Android SHARE SHEET first (system UI — it
     cannot fail silently; save to Files/Drive from there). Anchor
     download is the fallback for desktop. An embedding host without
     allow-downloads blocks anchors with NO error — share sheet is immune. */
  const chip=$('saveChip');
  chip.href=url; chip.download=name;
  chip.textContent=(canShare?'⇪ SAVE / SHARE ':'⇓ SAVE ')+name
    +' · '+(L.length/mctx.sampleRate).toFixed(1)+'s'
    +(embedded?' · ⚠ embedded host — use share':'');
  chip.classList.add('show');
  chip.onclick=(e)=>{
    if(canShare){
      e.preventDefault();
      navigator.share({files:[file], title:name})
        .then(()=>hintFlash('⇪ handed to the system — pick Files/Drive to save'))
        .catch(err=>{ if(String(err).indexOf('Abort')<0)
          hintFlash('✕ share failed: '+(err&&err.message||err)); });
      return;
    }
    setTimeout(()=>{ chip.classList.remove('show');
      URL.revokeObjectURL(url); },800);
  };
  hintFlash('⇓ capture ready — tap the red bar'+(canShare?' for the share sheet':''));
}
$('xClose').addEventListener('click',()=>{
  if(window.parent!==window) parent.postMessage({src:'srcd-duo',cmd:'close'},'*');
  else if(history.length>1) history.back();
  else $('hint').textContent='STANDALONE MODE — CLOSE THE TAB TO EXIT';
});
setTimeout(()=>$('hint').style.opacity=0, 7000);
</script>
</body>
