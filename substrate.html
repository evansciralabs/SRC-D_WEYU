<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EVANSCIRA LABS // SUBSTRΛTΞ</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050607;
  --edge: #1c2226;
  --txt: #cfd8dc;
  --dim: #5c686e;
  --riot: #43ffa4;
  --cult: #ff4d3d;
  --sub: #8ab8ff;
}
* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  -webkit-tap-highlight-color: transparent; 
}
html, body { 
  height: 100%; 
  overflow: hidden; 
}
body {
  background: var(--bg);
  font-family: 'Chakra Petch', monospace;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
}
#plate {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--edge);
  background: #07090b;
  flex-shrink: 0;
}
#plate .corp { 
  font-size: 9px; 
  letter-spacing: .3em; 
  color: var(--dim); 
}
#plate .corp b { 
  color: var(--txt); 
  font-weight: 600; 
}
#globalPlay {
  font-family: inherit;
  font-size: 11px;
  background: transparent;
  color: var(--sub);
  border: 1px solid var(--sub);
  padding: 5px 12px;
  cursor: pointer;
  letter-spacing: .12em;
  border-radius: 3px;
  margin-left: 16px;
  transition: all 0.2s ease;
}
#globalPlay.on {
  background: var(--sub);
  color: #050607;
  box-shadow: 0 0 12px rgba(138, 184, 255, 0.4);
}
#plate .mod {
  font-size: 11px;
  letter-spacing: .18em;
  margin-left: auto;
  transition: color .25s;
}
#plate .mod.riot { color: var(--riot); }
#plate .mod.cult { color: var(--cult); }
#xClose {
  font-family: inherit;
  font-size: 12px;
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--edge);
  padding: 5px 11px;
  cursor: pointer;
  letter-spacing: .1em;
  border-radius: 3px;
  margin-left: 12px;
}
/* ═ the SUBSTRΛTΞ mixer strip ═ */
#mixer {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  padding: 6px 10px;
  border-bottom: 1px solid var(--edge);
  background: #060809;
  flex-shrink: 0;
  overflow-x: auto;
}
.strip { 
  min-width: 76px; 
  flex: 1; 
  max-width: 130px; 
}
.strip .lbl {
  font-size: 8px;
  letter-spacing: .14em;
  color: var(--dim);
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}
.strip .lbl .v { color: var(--txt); }
.strip .rail {
  height: 22px;
  background: #0c1013;
  border: 1px solid var(--edge);
  position: relative;
  border-radius: 3px;
  overflow: hidden;
  touch-action: none;
  cursor: ew-resize;
}
.strip .fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--sub);
  opacity: .5;
}
.strip.c-riot .fill { background: var(--riot); }
.strip.c-cult .fill { background: var(--cult); }
.strip .gr {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  background: #ffb03d;
  opacity: .7;
  width: 0;
}
#dkMode {
  font-family: inherit;
  font-size: 9px;
  letter-spacing: .06em;
  background: #0c1013;
  color: var(--sub);
  border: 1px solid var(--edge);
  padding: 4px;
  border-radius: 3px;
  height: 22px;
}
#faces { 
  position: relative; 
  flex: 1; 
  overflow: hidden; 
}
.face {
  position: absolute;
  inset: 0;
  border: 0;
  width: 100%;
  height: 100%;
  transition: transform .28s cubic-bezier(.6,0,.3,1), visibility .28s;
}
.face.off-l { 
  transform: translateX(-102%); 
  visibility: hidden; 
  pointer-events: none; 
}
.face.off-r { 
  transform: translateX(102%); 
  visibility: hidden; 
  pointer-events: none; 
}
.face.on { 
  transform: translateX(0); 
  visibility: visible; 
}
#hint {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--dim);
  letter-spacing: .14em;
  pointer-events: none;
  opacity: 1;
  transition: opacity 1s;
  text-align: center;
  width: 92%;
}
</style>
</head>
<body>
<div id="plate">
  <div class="corp"><b>EVANSCIRA</b> LABS // SUBSTRΛTΞ</div>
  <button id="globalPlay">▶ SYNC START</button>
  <div class="mod riot" id="modName">MODULE 01 · OVERTONE_RIOT</div>
  <button id="xClose">✕ CONSOLE</button>
</div>

<div id="mixer">
  <div class="strip c-riot" id="sRiot"></div>
  <div class="strip c-cult" id="sCult"></div>
  <div class="strip" style="max-width:96px">
    <div class="lbl"><span>SIDECHAIN</span></div>
    <select id="dkMode">
      <option value="0">⤓ OFF</option>
      <option value="1">CULT ⤓ RIOT</option>
      <option value="2">RIOT ⤓ CULT</option>
    </select>
  </div>
  <div class="strip" id="sDuck"></div>
  <div class="strip" id="sGlue"></div>
  <div class="strip" id="sMaster"></div>
</div>

<div id="faces">
  <iframe class="face on" id="fRiot" src="overtone_riot.html" allow="autoplay"></iframe>
  <iframe class="face off-r" id="fCult" data-src="battery_cult.html" allow="autoplay"></iframe>
  <div id="hint">⫷ ⫸ IN A MODULE TITLE SWITCHES THE FACE · BOTH ENGINES STAY LIVE ·
    THE STRIP ABOVE IS THE SESSION MIXER — LEVELS, MODULE⤓MODULE SIDECHAIN, GLUE, MASTER</div>
</div>

<script>
"use strict";

const MIXER_WORKLET = `
class SubstrateMix extends AudioWorkletProcessor {
  static get parameterDescriptors() { 
    return [
      {name:'lvlA', defaultValue:0.9, minValue:0, maxValue:1.3},
      {name:'lvlB', defaultValue:0.9, minValue:0, maxValue:1.3},
      {name:'duckMode', defaultValue:0, minValue:0, maxValue:2},
      {name:'duckAmt', defaultValue:0.6, minValue:0, maxValue:1},
      {name:'glue', defaultValue:0, minValue:0, maxValue:1},
      {name:'master', defaultValue:0.9, minValue:0, maxValue:1.3},
    ];
  }
  constructor() { 
    super();
    this.envA = 0; 
    this.envB = 0; 
    this.cEnv = 0; 
    this.gr = 1;
    this.aA = 1 - Math.exp(-1 / (0.003 * sampleRate));
    this.aR = 1 - Math.exp(-1 / (0.14 * sampleRate));
    this.cR = 1 - Math.exp(-1 / (0.15 * sampleRate));
    this.fr = 0;
  }
  process(inputs, outputs, P) {
    const A = inputs[0], B = inputs[1], out = outputs[0];
    const L = out[0], R = out[1] || out[0], n = L.length;
    
    const lvlA = P.lvlA[0], lvlB = P.lvlB[0], dm = Math.round(P.duckMode[0]),
          dAmt = P.duckAmt[0], glue = P.glue[0], mas = P.master[0];
    const THR = 0.32, INVR = 1 - 1/3;
    
    for (let s = 0; s < n; s++) {
      const aL = A && A[0] ? A[0][s] : 0;
      const aR = A && A[1] ? A[1][s] : (A && A[0] ? A[0][s] : 0);
      const bL = B && B[0] ? B[0][s] : 0;
      const bR = B && B[1] ? B[1][s] : (B && B[0] ? B[0][s] : 0);
      
      const am = Math.max(aL < 0 ? -aL : aL, aR < 0 ? -aR : aR);
      const bm = Math.max(bL < 0 ? -bL : bL, bR < 0 ? -bR : bR);
      
      this.envA += (am - this.envA) * (am > this.envA ? this.aA : this.aR);
      this.envB += (bm - this.envB) * (bm > this.envB ? this.aA : this.aR);
      
      let gA = 1, gB = 1;
      if (dm === 1) { 
        const d = this.envB * 2.5; 
        gA = 1 - dAmt * 0.9 * (d > 1 ? 1 : d); 
      } else if (dm === 2) { 
        const d = this.envA * 2.5; 
        gB = 1 - dAmt * 0.9 * (d > 1 ? 1 : d); 
      }
      
      let L0 = aL * lvlA * gA + bL * lvlB * gB;
      let R0 = aR * lvlA * gA + bR * lvlB * gB;
      
      const pk = Math.max(L0 < 0 ? -L0 : L0, R0 < 0 ? -R0 : R0);
      if (pk > this.cEnv) this.cEnv = pk;
      else this.cEnv += (pk - this.cEnv) * this.cR;
      
      const over = this.cEnv / THR;
      const grT = over > 1 ? Math.pow(over, -INVR) : 1;
      this.gr += (grT - this.gr) * 0.2;
      const mk = 1.2;
      
      const cL = L0 * this.gr * mk;
      const cR = R0 * this.gr * mk;
      
      L0 = L0 * (1 - glue) + cL * glue;
      R0 = R0 * (1 - glue) + cR * glue;
      
      L[s] = Math.tanh(L0 * mas * 1.1);
      R[s] = Math.tanh(R0 * mas * 1.1);
    }
    if ((this.fr++ & 15) === 0) this.port.postMessage(['gr', this.gr]);
    return true;
  }
}
registerProcessor('substrate-mix', SubstrateMix);
`;

const $ = id => document.getElementById(id);
const riot = $('fRiot'), cult = $('fCult'), modName = $('modName');
let face = 0, cultLoaded = false, sysPlaying = false;

function show(f) {
  face = f;
  if (f === 1 && !cultLoaded) { 
    cult.src = cult.dataset.src; 
    cultLoaded = true; 
  }
  riot.className = 'face ' + (f === 0 ? 'on' : 'off-l');
  cult.className = 'face ' + (f === 1 ? 'on' : 'off-r');
  modName.textContent = f === 0 ? 'MODULE 01 · OVERTONE_RIOT' : 'MODULE 02 · BΛTTΞRY CULT';
  modName.className = 'mod ' + (f === 0 ? 'riot' : 'cult');
}

$('globalPlay').addEventListener('click', () => {
  sysPlaying = !sysPlaying;
  $('globalPlay').classList.toggle('on', sysPlaying);
  $('globalPlay').textContent = sysPlaying ? '■ SYNC STOP' : '▶ SYNC START';
  
  const msg = { src: 'SUBSTRATE', cmd: 'play', state: sysPlaying };
  if (riot.contentWindow) riot.contentWindow.postMessage(msg, '*');
  if (cult.contentWindow) cult.contentWindow.postMessage(msg, '*');
});

/* ═ session mixer ═ */
let mctx = null, mix = null;
const conf = (() => {
  try { return JSON.parse(localStorage.getItem('substrate.mix.v1')) || {}; }
  catch(_) { return {}; }
})();

const st = {
  lvlA: conf.lvlA ?? 0.9,
  lvlB: conf.lvlB ?? 0.9,
  duckMode: conf.duckMode ?? 0,
  duckAmt: conf.duckAmt ?? 0.6,
  glue: conf.glue ?? 0,
  master: conf.master ?? 0.9
};

function save() {
  try { localStorage.setItem('substrate.mix.v1', JSON.stringify(st)); }
  catch(_) {}
}

function setP(k, v) {
  st[k] = v;
  save();
  if (mix) mix.parameters.get(k).setTargetAtTime(v, mctx.currentTime, 0.02);
}

function strip(el, label, key, max, fmt, cls) {
  el.innerHTML = '<div class="lbl"><span>' + label + '</span><span class="v"></span></div>'
    + '<div class="rail"><div class="fill"></div><div class="gr"></div></div>';
    
  const rail = el.querySelector('.rail'), 
        fill = el.querySelector('.fill'), 
        vv = el.querySelector('.v');
  
  const render = () => {
    fill.style.width = (st[key] / max * 100) + '%';
    vv.textContent = fmt(st[key]);
  };
  
  const drag = e => {
    const r = rail.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const nn = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
    setP(key, nn * max);
    render();
  };
  
  rail.addEventListener('pointerdown', e => {
    rail.setPointerCapture(e.pointerId);
    drag(e);
    const mv = ev => drag(ev);
    const up = () => {
      rail.removeEventListener('pointermove', mv);
      rail.removeEventListener('pointerup', up);
    };
    rail.addEventListener('pointermove', mv);
    rail.addEventListener('pointerup', up);
  });
  
  render();
  return el;
}

const pct = v => Math.round(v * 100) + '%';
strip($('sRiot'), 'RIOT', 'lvlA', 1.3, pct);
strip($('sCult'), 'CULT', 'lvlB', 1.3, pct);
strip($('sDuck'), '⤓ AMOUNT', 'duckAmt', 1, pct);
strip($('sGlue'), 'GLUE', 'glue', 1, pct);
const mstEl = strip($('sMaster'), 'MASTER', 'master', 1.3, pct);

$('dkMode').value = String(st.duckMode);
$('dkMode').addEventListener('change', () => setP('duckMode', +$('dkMode').value));

async function ensureMixer() {
  if (mctx) return;
  mctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'playback' });
  const blob = new Blob([MIXER_WORKLET], { type: 'application/javascript' });
  await mctx.audioWorklet.addModule(URL.createObjectURL(blob));
  mix = new AudioWorkletNode(mctx, 'substrate-mix', { numberOfInputs: 2, outputChannelCount: [2] });
  mix.connect(mctx.destination);
  
  for (const k of ['lvlA', 'lvlB', 'duckMode', 'duckAmt', 'glue', 'master']) {
    mix.parameters.get(k).value = st[k];
  }
  
  mix.port.onmessage = e => {
    if (e.data[0] === 'gr') {
      const red = Math.min(1, Math.max(0, 1 - e.data[1]));
      mstEl.querySelector('.gr').style.width = (red * 80) + '%';
    }
  };
}

const hooked = { riot: false, cult: false };

window.addEventListener('message', async e => {
  const d = e.data;
  if (!d || d.src !== 'SUBSTRATE') return;
  
  if (d.cmd === 'switch') show(face === 0 ? 1 : 0);
  
  if (d.cmd === 'audio-ready') {
    try {
      await ensureMixer();
      if (mctx.state === 'suspended') await mctx.resume();
      
      const frame = d.mod === 'riot' ? riot : cult;
      if (hooked[d.mod]) return;
      
      const stream = frame.contentWindow.__srcdModuleOut;
      if (!stream) return;
      
      const srcN = mctx.createMediaStreamSource(stream);
      srcN.connect(mix, 0, d.mod === 'riot' ? 0 : 1);
      hooked[d.mod] = true;
      
      $('hint').textContent = '⛁ ' + d.mod.toUpperCase() + ' PATCHED INTO THE SUBSTRΛTΞ BUS';
      $('hint').style.opacity = 1;
      setTimeout(() => $('hint').style.opacity = 0, 2500);
      
      if (sysPlaying) {
        frame.contentWindow.postMessage({ src: 'SUBSTRATE', cmd: 'play', state: true }, '*');
      }
    } catch (err) {
      $('hint').textContent = '✕ bus patch failed: ' + (err.message || err);
      $('hint').style.opacity = 1;
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') show(face === 0 ? 1 : 0);
});

$('xClose').addEventListener('click', () => {
  if (window.parent !== window) parent.postMessage({ src: 'SUBSTRATE', cmd: 'close' }, '*');
  else if (history.length > 1) history.back();
  else $('hint').textContent = 'STANDALONE MODE — CLOSE THE TAB TO EXIT';
});

setTimeout(() => $('hint').style.opacity = 0, 7000);
</script>
</body>
</html>
